---
- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  loop:
    - "{{ app_dir }}"
    - "{{ app_dir }}/backend"
    - "{{ app_dir }}/frontend"

- name: Copy backend application files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../app/backend/"
    dest: "{{ app_dir }}/backend/"
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Copy frontend configuration
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../app/frontend/nginx.conf"
    dest: "{{ app_dir }}/frontend/nginx.conf"
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Deploy Docker Compose configuration
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Build and start application containers
  ansible.builtin.command:
    cmd: docker compose up -d --build
    chdir: "{{ app_dir }}"
  changed_when: true

- name: Verify containers are running
  ansible.builtin.command:
    cmd: docker compose ps
    chdir: "{{ app_dir }}"
  register: compose_status
  changed_when: false

- name: Show container status
  ansible.builtin.debug:
    var: compose_status.stdout_lines
